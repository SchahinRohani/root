name: Pull Request

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: >- # https://github.com/actions/checkout/releases/tag/v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Nix
        uses: >- # https://github.com/DeterminateSystems/nix-installer-action/releases/tag/v22
          DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

      - name: Run flake check
        run: nix flake check --print-build-logs

  detect:
    name: Detect
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: >- # https://github.com/dorny/paths-filter/releases/tag/v4.0.1
          dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            astro-bun:
              - 'packages/astro-bun/**'

  test:
    name: Test / ${{ matrix.package }}
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
    steps:
      - uses: >- # https://github.com/actions/checkout/releases/tag/v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: >- # https://github.com/oven-sh/setup-bun/releases/tag/v2.2.0
          oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
        working-directory: packages/${{ matrix.package }}
